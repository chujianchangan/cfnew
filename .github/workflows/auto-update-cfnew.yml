name: Auto Update CFNew (Main & Beta)

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 2 * * *" # 每天凌晨2点自动运行
  workflow_dispatch:     # 支持手动运行

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 初始化仓库
        uses: actions/checkout@v4

      # ==================== 1. 读取本地版本记录 ====================
      - name: 读取本地版本记录
        id: get_local_versions
        run: |
          echo -e "\033[34m[获取本地版本记录]\033[0m"
          
          # 读取 Main
          if [ -f version_main.txt ]; then
            LOCAL_MAIN=$(cat version_main.txt | tr -d '[:space:]')
          else
            LOCAL_MAIN="none"
          fi
          
          # 读取 Beta
          if [ -f version_beta.txt ]; then
            LOCAL_BETA=$(cat version_beta.txt | tr -d '[:space:]')
          else
            LOCAL_BETA="none"
          fi
          
          echo "LOCAL_MAIN=$LOCAL_MAIN" >> $GITHUB_ENV
          echo "LOCAL_BETA=$LOCAL_BETA" >> $GITHUB_ENV
          echo "本地 Main Hash: $LOCAL_MAIN"
          echo "本地 Beta Hash: $LOCAL_BETA"

      # ==================== 2. 获取远程最新 Commit ====================
      - name: 获取远程最新 Commit 信息
        id: get_remote_versions
        run: |
          echo -e "\033[34m[获取远程最新 Commit]\033[0m"
          TARGET_REPO="chujianchangan/cfnew"
          
          # 抓取远程 main 分支
          REMOTE_MAIN=$(curl -s "https://api.github.com/repos/$TARGET_REPO/commits/main" | jq -r '.sha' | tr -d '[:space:]')
          # 抓取远程 beta 分支
          REMOTE_BETA=$(curl -s "https://api.github.com/repos/$TARGET_REPO/commits/beta" | jq -r '.sha' | tr -d '[:space:]')
          
          # 容错处理
          if [ "$REMOTE_MAIN" = "null" ] || [ -z "$REMOTE_MAIN" ]; then echo "错误：无法获取 Main 分支"; exit 1; fi
          if [ "$REMOTE_BETA" = "null" ] || [ -z "$REMOTE_BETA" ]; then REMOTE_BETA="none"; echo "警告：未找到远程 Beta 分支或获取失败"; fi
          
          echo "REMOTE_MAIN=$REMOTE_MAIN" >> $GITHUB_ENV
          echo "REMOTE_BETA=$REMOTE_BETA" >> $GITHUB_ENV
          echo "远程 Main Hash: $REMOTE_MAIN"
          echo "远程 Beta Hash: $REMOTE_BETA"

      # ==================== 3. 比对并下载 Main 分支 ====================
      - name: 检查与同步 Main 稳定版
        run: |
          echo -e "\033[34m[检查 Main 稳定版]\033[0m"
          if [ "${{ env.LOCAL_MAIN }}" = "${{ env.REMOTE_MAIN }}" ]; then
            echo "Main 已经是最新，无需更新。"
          else
            echo "发现 Main 有更新，正在下载..."
            wget -O _worker.js "https://raw.githubusercontent.com/chujianchangan/cfnew/main/_worker.js"
            echo "${{ env.REMOTE_MAIN }}" > version_main.txt
            echo "NEED_COMMIT=true" >> $GITHUB_ENV
          fi

      # ==================== 4. 比对并下载 Beta 分支 ====================
      - name: 检查与同步 Beta 测试版
        if: env.REMOTE_BETA != 'none'
        run: |
          echo -e "\033[34m[检查 Beta 测试版]\033[0m"
          if [ "${{ env.LOCAL_BETA }}" = "${{ env.REMOTE_BETA }}" ]; then
            echo "Beta 已经是最新，无需更新。"
          else
            echo "发现 Beta 有更新，正在下载..."
            # 下载远程 beta 的 _worker.js，但在本地存为 _worker_beta.js 区分开
            wget -O _worker_beta.js "https://raw.githubusercontent.com/chujianchangan/cfnew/beta/_worker.js"
            echo "${{ env.REMOTE_BETA }}" > version_beta.txt
            echo "NEED_COMMIT=true" >> $GITHUB_ENV
          fi

      # ==================== 5. 统一提交代码 ====================
      - name: 提交并推送到你的仓库
        if: env.NEED_COMMIT == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🔄 自动同步 cfnew (Main: ${{ env.REMOTE_MAIN }} | Beta: ${{ env.REMOTE_BETA }})"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          push_options: --force
